#################
### AUTOSTART ###
#################
exec-once = hypridle
exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE
# exec-once = hyprshade auto
# exec-once = hyprpaper
# exec-once = waybar
exec-once = swaync
exec-once = awww-daemon
exec-once = awww img ~/.local/share/backgrounds/wallpaper
